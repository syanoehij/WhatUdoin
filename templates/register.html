{% extends "base.html" %}
{% block title %}WhatUDoin — 계정 가입{% endblock %}

{% block content %}
<div class="center-wrap">
  <div class="card card-sm">
    <h2 class="card-title">계정 가입</h2>
    <p class="card-desc">이름과 비밀번호로 가입하면 바로 시작할 수 있습니다.</p>

    <form id="reg-form" autocomplete="off">
      <div id="reg-error" class="form-error hidden"></div>

      <div class="form-row">
        <label>이름 *</label>
        <input type="text" id="reg-name" required placeholder="영문·숫자·한글" />
      </div>

      <div class="form-row">
        <label>비밀번호 *</label>
        <input type="password" id="reg-pw" required placeholder="영문과 숫자를 모두 포함" />
      </div>

      <div class="modal-actions" style="margin-top:20px">
        <div></div>
        <button type="submit" class="btn btn-primary">가입하기</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('reg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name   = document.getElementById('reg-name').value.trim();
  const pw     = document.getElementById('reg-pw').value.trim();
  const errEl  = document.getElementById('reg-error');
  errEl.classList.add('hidden');

  const res = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, password: pw }),
  });

  if (res.ok) {
    // 가입 직후 자동 로그인 — 홈으로 이동.
    window.location.href = '/';
  } else {
    const err = await res.json().catch(() => ({}));
    errEl.textContent = err.detail || '가입 실패';
    errEl.classList.remove('hidden');
  }
});
</script>
{% endblock %}
