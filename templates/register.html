{% extends "base.html" %}
{% block title %}WhatUDoin — 계정 가입{% endblock %}

{% block content %}
<div class="center-wrap">
  <div class="card card-sm">
    <h2 class="card-title">계정 가입</h2>
    <p class="card-desc">이름과 비밀번호로 가입하면 바로 시작할 수 있습니다.</p>

    <form id="reg-form" autocomplete="off">
      <div id="reg-error" class="form-error hidden"></div>

      <div class="form-row">
        <label>이름 *</label>
        <input type="text" id="reg-name" required placeholder="한글 이름을 입력하세요" />
      </div>

      <div class="form-row">
        <label>비밀번호 *</label>
        <input type="password" id="reg-pw" required placeholder="영문과 숫자를 모두 포함" />
      </div>

      <div class="form-row">
        <label>비밀번호 확인 *</label>
        <input type="password" id="reg-pw-confirm" required placeholder="비밀번호를 한 번 더 입력" />
      </div>

      <div class="modal-actions" style="margin-top:20px">
        <div></div>
        <button type="submit" class="btn btn-primary">가입하기</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const regForm = document.getElementById('reg-form');
regForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (regForm.dataset.submitting === '1') return;

  const name      = document.getElementById('reg-name').value.trim();
  const pw        = document.getElementById('reg-pw').value.trim();
  const pwConfirm = document.getElementById('reg-pw-confirm').value.trim();
  const errEl     = document.getElementById('reg-error');
  const submitBtn = regForm.querySelector('button[type="submit"]');
  errEl.classList.add('hidden');

  if (pw !== pwConfirm) {
    errEl.textContent = '비밀번호가 일치하지 않습니다.';
    errEl.classList.remove('hidden');
    return;
  }

  regForm.dataset.submitting = '1';
  if (submitBtn) submitBtn.disabled = true;

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, password: pw, password_confirm: pwConfirm }),
    });

    if (res.ok) {
      // 가입 직후 자동 로그인 — 홈으로 이동.
      window.location.href = '/';
      return;
    }

    const err = await res.json().catch(() => ({}));
    errEl.textContent = err.detail || '가입 실패';
    errEl.classList.remove('hidden');
  } catch (err) {
    errEl.textContent = '가입 요청 중 오류가 발생했습니다.';
    errEl.classList.remove('hidden');
  } finally {
    delete regForm.dataset.submitting;
    if (submitBtn) submitBtn.disabled = false;
  }
});
</script>
{% endblock %}
