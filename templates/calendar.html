{% extends "base.html" %}
{% block title %}WhatUDoin — 캘린더{% endblock %}

{% block extra_head %}
<style>
  main { max-width: none; padding: 20px 28px; }
</style>
{% endblock %}

{% block content %}
<div class="toolbar">
  {% if user and user.role in ('editor', 'admin') %}
  <button class="btn btn-primary" onclick="openModal()">+ 일정 추가</button>
  {% else %}
  <button class="btn btn-outline" onclick="openLoginModal()">로그인하여 일정 추가</button>
  {% endif %}
</div>

<div id="calendar"></div>

<!-- ── 상세 모달 ── -->
<div id="detail-overlay" class="modal-overlay hidden" onclick="closeDetail(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detail-title"></h2>
      <button class="icon-btn" onclick="closeDetail()">✕</button>
    </div>
    <div id="detail-body" class="detail-body"></div>
    <div class="modal-actions">
      <div></div>
      <div>
        <button class="btn" onclick="closeDetail()">닫기</button>
        <button class="btn btn-primary" id="btn-edit-from-detail" onclick="editFromDetail()">수정</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let calendar;
let currentDetailEventId = null;
let currentDetailEventTeamId = null;

// ── FullCalendar 초기화 ─────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('calendar');
  calendar = new FullCalendar.Calendar(el, {
    initialView: 'dayGridMonth',
    locale: 'ko',
    height: 'auto',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridTwoWeek,timeGridWeek,timeGridDay',
    },
    buttonText: { today: '오늘', month: '월', week: '주', day: '일' },
    views: {
      timeGridTwoWeek: {
        type: 'timeGrid',
        duration: { weeks: 2 },
        buttonText: '2주',
      },
    },
    eventSources: [
      { url: '/api/events' },
      { url: '/api/meetings/calendar', color: '#00b894', textColor: 'white' },
    ],
    datesSet() { applyStickyAllDay(); },
    eventDidMount() { applyStickyAllDay(); },
    eventClick(info) {
      if (info.event.extendedProps.type === 'meeting') {
        location.href = `/meetings/${info.event.extendedProps.meeting_id}?from=calendar`;
        return;
      }
      showDetail(info.event);
    },
    dateClick(info) {
      if (CURRENT_USER) openModal(info.dateStr);
    },
  });
  calendar.render();
  applyStickyAllDay();

  // 캘린더 페이지 전용 콜백 설정
  window.onEventSaved = () => calendar.refetchEvents();
  window.onModalDateChanged = updateDateEvents;

  // 칸반에서 수정 링크로 접근한 경우 자동으로 모달 열기
  const editId = new URLSearchParams(location.search).get('edit');
  if (editId && CURRENT_USER) {
    fetch(`/api/events/${editId}`)
      .then(r => r.json())
      .then(data => openModal('', data))
      .catch(() => {});
  }

  // ── 주/일 뷰 all-day 행 sticky 고정 ───────────────────
  function applyStickyAllDay() {
    const view = calendar.view.type;
    const sections = document.querySelectorAll('tr.fc-scrollgrid-section');
    if (sections.length < 2) return;

    if (view === 'timeGridWeek' || view === 'timeGridDay' || view === 'timeGridTwoWeek') {
      const headerH = sections[0].getBoundingClientRect().height;
      const alldayH = sections[1].getBoundingClientRect().height;

      // tr의 직접 자식 셀만 sticky — 중첩 테이블 셀은 건드리지 않음
      [...sections[1].children].forEach(cell => {
        cell.style.position = 'sticky';
        cell.style.top      = headerH + 'px';
        cell.style.zIndex   = '2';
        cell.style.background = '#fff';
      });

      // 구분선 sticky
      if (sections[2]) {
        [...sections[2].children].forEach(cell => {
          cell.style.position = 'sticky';
          cell.style.top      = (headerH + alldayH) + 'px';
          cell.style.zIndex   = '0';
        });
      }
    } else {
      // 월 뷰 등에서는 원상 복구
      [sections[1], sections[2]].forEach(sec => {
        [...(sec?.children ?? [])].forEach(cell => {
          cell.style.position = '';
          cell.style.top      = '';
          cell.style.zIndex   = '';
          cell.style.background = '';
        });
      });
    }
  }

  // ── 마우스 휠로 날짜 이동 ──────────────────────────────
  // 주/일 뷰: col-header + all-day 영역(.fc-col-header, .fc-daygrid-body)에서는 주 이동
  //          시간 격자(.fc-timegrid-body)에서는 자연 페이지 스크롤
  let wheelTimer = null;
  document.getElementById('calendar').addEventListener('wheel', (e) => {
    const view = calendar.view.type;

    if (view === 'timeGridWeek' || view === 'timeGridDay' || view === 'timeGridTwoWeek') {
      // .fc-timegrid-body 안에서 휠 → 자연 스크롤에 맡김 (preventDefault 안 함)
      if (e.target.closest('.fc-timegrid-body')) return;
    }

    e.preventDefault();
    if (wheelTimer) return;
    wheelTimer = setTimeout(() => { wheelTimer = null; }, 300);
    e.deltaY > 0 ? calendar.next() : calendar.prev();
  }, { passive: false });
});

// ── 해당 날짜 기존 일정 표시 ──────────────────────────────
function updateDateEvents(start, end) {
  const list = document.getElementById('date-events-list');
  const currentId = document.getElementById('event-id').value;
  const startD = new Date(start);
  const endD   = new Date(end || start);
  endD.setHours(23, 59, 59);

  const events = calendar.getEvents().filter(ev => {
    if (ev.extendedProps.type === 'meeting') return false;
    if (String(ev.id) === String(currentId)) return false;
    const evStart = ev.start;
    const evEnd   = ev.end || ev.start;
    return evStart <= endD && evEnd >= startD;
  });

  if (!events.length) {
    list.innerHTML = '<span class="date-events-empty">해당 기간에 일정 없음</span>';
    return;
  }
  list.innerHTML = events.map(ev => {
    const timeStr = ev.allDay ? '종일' : ev.start.toLocaleTimeString('ko', { hour: '2-digit', minute: '2-digit', hour12: false });
    return `<div class="date-event-item">
      <span class="date-event-dot"></span>
      <span class="date-event-time">${timeStr}</span>
      <span class="date-event-title">${ev.title}</span>
    </div>`;
  }).join('');
}

// ── 상세 보기 ──────────────────────────────────────────
function showDetail(fcEvent) {
  currentDetailEventId = fcEvent.id;
  const p = fcEvent.extendedProps;
  currentDetailEventTeamId = p.team_id;

  document.getElementById('detail-title').textContent = fcEvent.title;

  const rows = [
    ['시작',    formatDatetime(fcEvent.startStr, p.all_day)],
    ['종료',    fcEvent.endStr ? formatDatetime(fcEvent.endStr, p.all_day) : '-'],
    ['프로젝트', p.project    || '-'],
    ['장소',    p.location    || '-'],
    ['담당자',  p.assignee    || '-'],
    ['내용',    p.description || '-'],
  ];

  if (p.source === 'ai_parsed' && p.meeting_id) {
    rows.push(['회의록', `<a href="/meetings/${p.meeting_id}" class="link">원본 회의록 보기</a>`]);
  }

  document.getElementById('detail-body').innerHTML = rows.map(([label, val]) => `
    <div class="detail-row">
      <span class="detail-label">${label}</span>
      <span class="detail-val">${label === '회의록' ? val : esc(val)}</span>
    </div>
  `).join('');

  // 수정 버튼: 에디터/관리자이고 자기 팀 일정일 때만 표시
  const editBtn = document.getElementById('btn-edit-from-detail');
  const canEdit = CURRENT_USER && (
    CURRENT_USER.role === 'admin' ||
    (CURRENT_USER.role === 'editor' && (p.team_id === null || p.team_id === CURRENT_USER.team_id))
  );
  editBtn.style.display = canEdit ? '' : 'none';

  document.getElementById('detail-overlay').classList.remove('hidden');
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detail-overlay')) return;
  document.getElementById('detail-overlay').classList.add('hidden');
  currentDetailEventId = null;
}

async function editFromDetail() {
  if (!currentDetailEventId) return;
  const res = await fetch(`/api/events/${currentDetailEventId}`);
  const data = await res.json();
  document.getElementById('detail-overlay').classList.add('hidden');
  openModal('', data);
}

</script>
{% endblock %}
